name: V8.4 Momentum Swing Quant Engine
concurrency:
  group: v84-quant-engine-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

on:
  schedule:
    - cron: '50 23 * * 0-4'
    - cron: '0 6 * * 1-5'
    - cron: '40 6 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install packages
      run: |
        python -m pip install --upgrade pip
        # 파일이 없을 경우를 대비해 직접 설치 명령 병행
        pip install finance-datareader pandas python-telegram-bot pytz
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Run Engine
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
