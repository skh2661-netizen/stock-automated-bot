name: V8.4.2 Quant Stock Engine
on:
  schedule:
    - cron: '45 23 * * 0-4'
    - cron: '0 6 * * 1-5'
    - cron: '40 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-stock-engine:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install finance-datareader pandas numpy pytz python-telegram-bot
      - env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
      - name: Save database
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/candidates.db || true
          git commit -m "Update quant database" || true
          git push
