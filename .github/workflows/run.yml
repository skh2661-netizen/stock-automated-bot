name: V8.4 Momentum Swing Quant Engine
concurrency:
  group: v84-quant-engine-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

on:
  schedule:
    - cron: '35 23 * * 0-4' 
    - cron: '55 04 * * 1-5' 
    - cron: '35 05 * * 1-5' 
  workflow_dispatch:
    inputs:
      run_mode:
        description: '수동 실행 모드 (OPEN_SCAN / CLOSE_SCAN / REVIEW)'
        required: true
        default: 'REVIEW'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with: {python-version: '3.11'}

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Determine Target Mode
      id: mode_selector
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "MODE=${{ github.event.inputs.run_mode }}" >> $GITHUB_ENV
        elif [ "${{ github.event.schedule }}" == "35 23 * * 0-4" ]; then
          echo "MODE=OPEN_SCAN" >> $GITHUB_ENV
        elif [ "${{ github.event.schedule }}" == "55 04 * * 1-5" ]; then
          echo "MODE=CLOSE_SCAN" >> $GITHUB_ENV
        elif [ "${{ github.event.schedule }}" == "35 05 * * 1-5" ]; then
          echo "MODE=REVIEW" >> $GITHUB_ENV
        else
          echo "MODE=REVIEW" >> $GITHUB_ENV
        fi

    - name: Run Engine & Fire Signal
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py $MODE

    - name: DB Auto-Backup Force Commit
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add *.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "[Auto-Backup] candidates.db update by ${{ env.MODE }}" && git push)
