name: V8.4 Momentum Swing Quant Engine

on:
  schedule:
    # 08:45 KST (UTC 23:45)
    - cron: '45 23 * * 0-4'
    # 15:00 KST (UTC 06:00)
    - cron: '0 6 * * 1-5'
    # 15:40 KST (UTC 06:40)
    - cron: '40 6 * * 1-5'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install packages
      run: |
        pip install -r requirements.txt

    - name: Run Engine
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python main.py
