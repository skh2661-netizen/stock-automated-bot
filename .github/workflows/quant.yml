name: V8.4 Momentum Swing Quant Engine

on:
  schedule:
    # KST 08:35 (UTC 기준 전날 23:35 일~목) -> KST 월~금 장 시작 스캔
    - cron: '35 23 * * 0-4'
    # KST 14:55 (UTC 기준 당일 05:55 월~금) -> KST 월~금 장 마감 스캔
    - cron: '55 5 * * 1-5'
    # KST 15:35 (UTC 기준 당일 06:35 월~금) -> KST 월~금 장 마감 리뷰
    - cron: '35 6 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 (OPEN_SCAN / CLOSE_SCAN / REVIEW)"
        required: true
        default: "REVIEW"

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Engine
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # 1. 수동 실행(workflow_dispatch) 시 입력받은 모드 최우선 타격
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          python main.py ${{ github.event.inputs.mode }}
        else
          # 2. 자동 스케줄 실행 시 (트래픽 지연으로 인한 1~10분 오차 완벽 무시)
          SCHEDULE="${{ github.event.schedule }}"
          
          if [ "$SCHEDULE" == "35 23 * * 0-4" ]; then
             python main.py OPEN_SCAN
          elif [ "$SCHEDULE" == "55 5 * * 1-5" ]; then
             python main.py CLOSE_SCAN
          elif [ "$SCHEDULE" == "35 6 * * 1-5" ]; then
             python main.py REVIEW
          else
             # 예외 상황 발생 시 안전장치로 REVIEW 모드 가동
             python main.py REVIEW
          fi
        fi

    - name: Save Database (Persistent DB)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/candidates.db
        # DB 내용에 변동이 있을 때만 안전하게 커밋 수행, 오류 시 무시(|| true)하여 워크플로우 크래시 방어
        git diff --quiet && git diff --staged --quiet || (git commit -m "[Auto] Update candidate database" && git push)
