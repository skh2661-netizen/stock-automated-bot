name: V8.4 Momentum Swing Quant Engine

on:
  schedule:
    # KST 08:35 (UTC 기준 전날 23:35) -> 장 시작 스캔
    - cron: '35 23 * * 0-4'
    # KST 14:55 (UTC 기준 당일 05:55) -> 장 마감 스캔
    - cron: '55 5 * * 1-5'
    # KST 15:35 (UTC 기준 당일 06:35) -> 장 마감 리뷰
    - cron: '35 6 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 (OPEN_SCAN / CLOSE_SCAN / REVIEW)"
        required: true
        default: "REVIEW"

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Engine
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # 수동 실행 시 입력받은 인자값 최우선 처리
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          python main.py ${{ github.event.inputs.mode }}
        else
          # 자동 실행 시 UTC 기준 분 단위 정밀 매칭
          TIME=$(date -u +%H:%M)
          if [ "$TIME" == "23:35" ]; then
             python main.py OPEN_SCAN
          elif [ "$TIME" == "05:55" ]; then
             python main.py CLOSE_SCAN
          else
             python main.py REVIEW
          fi
        fi

    - name: Save Database (Persistent DB)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/candidates.db
        git commit -m "[Auto] Update candidate database" || true
        git push || true
