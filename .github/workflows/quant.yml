name: V8.4.5 Quant Engine Automated

permissions:
  contents: write

on:
  workflow_dispatch:
  # 매일 한국 시간 09:10 (UTC 00:10) 실행을 원하시면 아래 주석을 해제하세요.
  # schedule:
  #   - cron: '10 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install
      run: |
        python -m pip install --upgrade pip
        # V13 엔진 구동을 위한 전체 의존성 명시
        pip install pandas finance-datareader python-telegram-bot pytz yfinance requests beautifulsoup4 lxml numpy pandas-ta

    - name: Run Quant
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Commit DB
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # 데이터베이스 파일 존재 여부 확인 후 git add
        if [ -f data/candidates.db ]; then
            git add data/candidates.db
            git diff --quiet && git diff --staged --quiet || (
              git commit -m "Auto-update DB" &&
              git push
            )
        else
            echo "Database file not found, skipping commit."
        fi
