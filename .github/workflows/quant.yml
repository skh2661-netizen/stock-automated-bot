name: V8.4 Momentum Swing Quant Engine

on:
  schedule:
    # KST 08:35 (UTC 기준 일~목 23:35) -> 월~금 아침 시초가 스캔
    - cron: '35 23 * * 0-4'
    # KST 14:55 (UTC 기준 월~금 05:55) -> 월~금 오후 종가 베팅 스캔
    - cron: '55 5 * * 1-5'
    # KST 15:35 (UTC 기준 월~금 06:35) -> 월~금 장마감 사후 검증 및 D+3 익절 복기
    - cron: '35 6 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 (OPEN_SCAN / CLOSE_SCAN / REVIEW)"
        required: true
        default: "REVIEW"

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Engine
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          python main.py ${{ github.event.inputs.mode }}
        else
          SCHEDULE="${{ github.event.schedule }}"
          
          if [ "$SCHEDULE" == "35 23 * * 0-4" ]; then
             python main.py OPEN_SCAN
          elif [ "$SCHEDULE" == "55 5 * * 1-5" ]; then
             python main.py CLOSE_SCAN
          elif [ "$SCHEDULE" == "35 6 * * 1-5" ]; then
             python main.py REVIEW
          else
             python main.py REVIEW
          fi
        fi

    - name: Save Database (Persistent DB)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add data/candidates.db
        # [안정화] git pull --rebase 추가로 원격지 커밋 충돌 원천 해결
        git diff --cached --quiet || (
          git pull --rebase
          git commit -m "[Auto] Update candidate database"
          git push
        )
