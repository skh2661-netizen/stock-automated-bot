name: V8.4.5 Quant Terminal Auto-Run

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '40 23 * * 0-4'
    - cron: '0 6 * * 1-5'
    - cron: '40 6 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader python-telegram-bot pytz

    - name: 퀀트 파이프라인 가동 (메인 엔진)
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: DB 업데이트 결과 Git 커밋 및 푸시
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/candidates.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update DB: telegram_sent flags" && git push)
